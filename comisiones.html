<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <title>Mis Ganancias - JAAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .summary-cards {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }
        .summary-card {
            background: white;
            padding: 1rem 0.75rem;
            border-radius: var(--radius-md);
            text-align: center;
            box-shadow: var(--shadow-sm);
        }
        .summary-card .card-value {
            font-size: 1.3rem;
            font-weight: 700;
            color: var(--primary-dark);
            font-family: 'Outfit', sans-serif;
        }
        .summary-card .card-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            margin-top: 0.2rem;
            font-weight: 500;
        }

        .section-box {
            background: white;
            padding: 1.25rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-sm);
            margin-bottom: 1.5rem;
        }
        .section-box h3 {
            color: var(--primary-dark);
            font-size: 1rem;
            margin-bottom: 0.75rem;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 0.5rem;
        }

        .comision-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.75rem 0;
            border-bottom: 1px solid #f1f5f9;
        }
        .comision-item:last-child { border-bottom: none; }
        .comision-item .info strong {
            display: block;
            font-size: 0.9rem;
            color: var(--text-main);
        }
        .comision-item .info small {
            color: var(--text-muted);
            font-size: 0.78rem;
        }
        .comision-item .monto {
            font-weight: 700;
            color: var(--success);
            font-size: 0.95rem;
            font-family: 'Outfit', sans-serif;
        }

        .empty-state {
            text-align: center;
            color: var(--text-muted);
            padding: 2rem;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="app-container">
        <header class="top-nav glass">
            <div class="nav-content">
                <div class="brand">
                    <div class="logo-icon">💰</div>
                    <h1>Mis Ganancias</h1>
                </div>
            </div>
        </header>

        <main class="content">
            <!-- Resumen -->
            <div class="summary-cards">
                <div class="summary-card">
                    <div class="card-value" id="totalAcumulado">B/.0.00</div>
                    <div class="card-label">Acumulado</div>
                </div>
                <div class="summary-card">
                    <div class="card-value" id="totalEsteMes">B/.0.00</div>
                    <div class="card-label">Este Mes</div>
                </div>
                <div class="summary-card">
                    <div class="card-value" id="totalCobros">0</div>
                    <div class="card-label">Cobros</div>
                </div>
            </div>

            <!-- Desglose Mensual -->
            <div class="section-box">
                <h3>📅 Desglose Mensual</h3>
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Mes</th>
                            <th style="text-align:right;">Cobros</th>
                            <th style="text-align:right;">Comisión</th>
                        </tr>
                    </thead>
                    <tbody id="tablaMensual">
                        <tr><td colspan="3" class="empty-state">Cargando...</td></tr>
                    </tbody>
                </table>
            </div>

            <!-- Comisiones Recientes -->
            <div class="section-box">
                <h3>🧾 Comisiones Recientes</h3>
                <div id="listaComisiones">
                    <div class="empty-state">Cargando comisiones...</div>
                </div>
            </div>
        </main>

        <nav class="bottom-nav"></nav>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/comisiones.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const session = Auth.getSession();
            if (!session || session.role !== 'cobrador') {
                window.location.href = 'login.html';
                return;
            }

            const username = session.username;
            const resumen = Comisiones.getResumenCobrador(username);
            const historial = Comisiones.getHistorial();

            // --- Resumen cards ---
            document.getElementById('totalAcumulado').textContent = 'B/.' + (resumen.totalAcumulado || 0).toFixed(2);
            document.getElementById('totalEsteMes').textContent   = 'B/.' + (resumen.esteMes || 0).toFixed(2);
            document.getElementById('totalCobros').textContent    = resumen.cobrosEsteMes || 0;

            // --- Desglose mensual (últimos 6 meses) ---
            const meses = ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'];
            const hoy = new Date();
            const tablaMensual = document.getElementById('tablaMensual');
            const desglose = resumen.desgloseMensual || [];

            if (desglose.length > 0) {
                tablaMensual.innerHTML = desglose.slice(0, 6).map(d => `
                    <tr>
                        <td>${meses[d.mes - 1] || 'Mes ' + d.mes} ${d.anio || ''}</td>
                        <td style="text-align:right;">${d.cobros}</td>
                        <td style="text-align:right; color:var(--success); font-weight:600;">B/.${(d.comision || 0).toFixed(2)}</td>
                    </tr>
                `).join('');
            } else {
                // Generar últimos 6 meses vacíos como fallback
                let filas = '';
                for (let i = 0; i < 6; i++) {
                    const fecha = new Date(hoy.getFullYear(), hoy.getMonth() - i, 1);
                    filas += `
                        <tr>
                            <td>${meses[fecha.getMonth()]} ${fecha.getFullYear()}</td>
                            <td style="text-align:right;">0</td>
                            <td style="text-align:right; color:var(--text-muted);">B/.0.00</td>
                        </tr>
                    `;
                }
                tablaMensual.innerHTML = filas;
            }

            // --- Comisiones recientes ---
            const lista = document.getElementById('listaComisiones');
            const miHistorial = (historial || [])
                .filter(c => c.cobrador === username)
                .sort((a, b) => new Date(b.fecha) - new Date(a.fecha));

            if (miHistorial.length > 0) {
                lista.innerHTML = miHistorial.map(c => `
                    <div class="comision-item">
                        <div class="info">
                            <strong>${c.vecino || 'Vecino'}</strong>
                            <small>${c.fecha || '-'} · Pago B/.${(c.montoPago || 0).toFixed(2)}</small>
                        </div>
                        <div class="monto">+B/.${(c.comision || 0).toFixed(2)}</div>
                    </div>
                `).join('');
            } else {
                lista.innerHTML = '<div class="empty-state">No hay comisiones registradas aún.</div>';
            }
        });
    </script>
    <div id="toastNotification" class="toast">Guardado</div>
</body>
</html>
