<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <title>JAAR Piloto - Caballero (Antón)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .filtros-bar {
            display: flex;
            gap: 0.5rem;
            padding: 0.75rem 0;
            flex-wrap: wrap;
        }
        .filtros-bar select {
            flex: 1;
            min-width: 130px;
            padding: 0.5rem 0.6rem;
            border: 1px solid #e2e8f0;
            border-radius: var(--radius-md);
            font-family: 'Inter', sans-serif;
            font-size: 0.85rem;
            background: white;
            color: var(--text-main);
            outline: none;
        }
        .filtros-bar select:focus { border-color: var(--primary); }

        /* Estado badges en tarjetas */
        .estado-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            border-radius: 99px;
            margin-left: 0.35rem;
            vertical-align: middle;
        }
        .estado-activo    { background: #dcfce7; color: #166534; }
        .estado-moroso    { background: #fef9c3; color: #92400e; }
        .estado-corte     { background: #fee2e2; color: #991b1b; }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Encabezado Fijo -->
        <header class="top-nav glass">
            <div class="nav-content">
                <div class="brand">
                    <div class="logo-icon">💧</div>
                    <h1>Piloto Caballero (Antón)</h1>
                </div>
                <button id="syncBtn" class="sync-btn" aria-label="Sincronizar a la nube">
                    <span class="icon">☁️</span>
                    <span class="sync-text">Sincronizar</span>
                </button>
            </div>
            
            <div class="status-bar" id="statusBar">
                <span id="connectionBadge" class="badge online">Buscando red...</span>
                <span class="pendings">Cobros sin subir: <strong id="pendingCount">0</strong></span>
            </div>
        </header>

        <!-- Contenido Deslizable -->
        <main class="content">
            <section class="action-section">
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="Buscar vecino o sector..." autocomplete="off">
                </div>

                <!-- Filtros -->
                <div class="filtros-bar">
                    <select id="filtroMes">
                        <option value="">📅 Todos los meses</option>
                        <option value="1">Enero</option>
                        <option value="2">Febrero</option>
                        <option value="3">Marzo</option>
                        <option value="4">Abril</option>
                        <option value="5">Mayo</option>
                        <option value="6">Junio</option>
                        <option value="7">Julio</option>
                        <option value="8">Agosto</option>
                        <option value="9">Septiembre</option>
                        <option value="10">Octubre</option>
                        <option value="11">Noviembre</option>
                        <option value="12">Diciembre</option>
                    </select>
                    <select id="filtroEstado">
                        <option value="">🟢 Todos los estados</option>
                        <option value="activo">✅ Activo / Al Día</option>
                        <option value="moroso">⚠️ Moroso</option>
                        <option value="corte">🔴 Para Corte</option>
                    </select>
                </div>

                <!-- Notificación animada -->
                <div id="toastNotification" class="toast hidden">
                    Mensaje del sistema
                </div>
            </section>

            <section class="list-section">
                <div class="section-header">
                    <h2>Comunidad (Cobro Offline)</h2>
                    <button class="btn-icon" id="addDemoUserBtn" aria-label="Crear Demo">+</button>
                </div>
                
                <div id="usersList" class="cards-grid">
                    <div class="empty-state">Cargando datos locales...</div>
                </div>
            </section>
        </main>

        <!-- Se dibuja via auth.js según el Rol -->
        <nav class="bottom-nav"></nav>
    </div>

    <script src="js/store.js"></script>
    <script src="js/auth.js"></script>
    <script src="app.js"></script>
</body>
</html>
