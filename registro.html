<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0d9488">
    <title>Solicitar Acceso - JAAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        body { display:flex; align-items:center; justify-content:center; min-height:100vh; background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); padding: 1rem; }
        .card { background:white; padding:2rem; border-radius:var(--radius-lg); width:100%; max-width:420px; box-shadow: 0 20px 40px rgba(0,0,0,0.3); }
        .card h2 { color:var(--primary-dark); margin-bottom:0.25rem; }
        .card p { color:var(--text-muted); font-size:0.875rem; margin-bottom:1.5rem; }
        .badge-pending { display:inline-block; background:#fef9c3; color:#92400e; font-size:0.75rem; font-weight:600; padding:0.2rem 0.6rem; border-radius:99px; margin-bottom:1rem; }
        .back-link { display:block; text-align:center; margin-top:1rem; color:var(--primary); font-size:0.875rem; text-decoration:none; }
    </style>
</head>
<body>
    <div class="card">
        <div style="font-size:2.5rem; margin-bottom:0.75rem;">📋</div>
        <h2>Solicitar Acceso</h2>
        <p>Un administrador revisará tu solicitud y habilitará tu cuenta.</p>
        <span class="badge-pending">⏳ Pendiente de Aprobación</span>

        <div class="form-group">
            <label>Nombre Completo</label>
            <input type="text" id="regNombre" class="form-input" placeholder="Ej: Ana García">
        </div>
        <div class="form-group">
            <label>Número de Casa / ID</label>
            <input type="text" id="regCasa" class="form-input" placeholder="Ej: Casa-07">
        </div>
        <div class="form-group">
            <label>Usuario (para iniciar sesión)</label>
            <input type="text" id="regUser" class="form-input" placeholder="Ej: ana.garcia">
        </div>
        <div class="form-group">
            <label>Contraseña Deseada</label>
            <input type="password" id="regPass" class="form-input" placeholder="Mínimo 4 caracteres">
        </div>
        <div class="form-group">
            <label>Tipo de Acceso Solicitado</label>
            <select id="regRol" class="form-input">
                <option value="cliente">Cliente / Vecino</option>
                <option value="cobrador">Cobrador / Directiva</option>
            </select>
        </div>

        <button class="btn-primary" id="btnRegistrar">Enviar Solicitud</button>
        <a href="login.html" class="back-link">← Volver al Login</a>
    </div>

    <script src="js/registro.js"></script>
</body>
</html>
