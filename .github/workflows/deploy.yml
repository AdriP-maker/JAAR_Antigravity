name: CI/CD JAAR Digital

on:
  push:
    branches:
      - main
      - actualizacion_jaar
  pull_request:
    branches:
      - main
      - actualizacion_jaar

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      # - name: Run Lint
      #   run: npm run lint

      # - name: Run Tests
      #   run: npm test

      - name: Build Application (Vite)
        run: npm run build
        env:
          # VITE_OPENAI_API_KEY: ${{ secrets.VITE_OPENAI_API_KEY }}
          CI: true

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/actualizacion_jaar'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
